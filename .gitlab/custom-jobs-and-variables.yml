# We define the following GitLab pipeline variables:
variables:
# On LLNL's machines, this pipeline creates only one allocation shared among jobs
# in order to save time and resources. This allocation has to be uniquely named
# so that we are sure to retrieve it and avoid collisions.
  ALLOC_NAME: ${CI_PROJECT_NAME}_ci_${CI_PIPELINE_ID}

# Dane
# Arguments for top level allocation
  DANE_SHARED_ALLOC: "--exclusive --reservation=ci --time=45 --nodes=1"
# Arguments for job level allocation
  DANE_JOB_ALLOC: "--reservation=ci --nodes=1"
  # Arguments for performance job allocation (dedicated allocation with no overlapping).
  DANE_PERF_ALLOC: "--exclusive --reservation=ci --time=15 --nodes=1"
# Project specific variants for dane
  PROJECT_DANE_VARIANTS: "~shared +openmp"
# Project specific deps for dane
  PROJECT_DANE_DEPS: "^blt@develop "

# Corona
# Arguments for top level allocation
  CORONA_SHARED_ALLOC: "--exclusive --time-limit=25m --nodes=1 -o per-resource.count=2"
# Arguments for job level allocation
  CORONA_JOB_ALLOC: "--nodes=1 --begin-time=+5s"
# Project specific variants for corona
  PROJECT_CORONA_VARIANTS: "~shared ~openmp"
# Project specific deps for corona
  PROJECT_CORONA_DEPS: "^blt@develop "

# Tioga
# Arguments for top level allocation
  TIOGA_SHARED_ALLOC: "--queue=pci --exclusive --time-limit=31m --nodes=1 -o per-resource.count=2"
# Arguments for job level allocation
  TIOGA_JOB_ALLOC: "--nodes=1 --begin-time=+5s"
# Project specific variants for tioga
  PROJECT_TIOGA_VARIANTS: "~shared +openmp"
# Project specific deps for tioga
  PROJECT_TIOGA_DEPS: "^blt@develop "

# Tuolumne
# Arguments for top level allocation
  TUOLUMNE_SHARED_ALLOC: "--queue=pci --exclusive --time-limit=31m --nodes=1 -o per-resource.count=2"
# Arguments for job level allocation
  TUOLUMNE_JOB_ALLOC: "--nodes=1 --begin-time=+5s"
# Arguments for performance job allocation (dedicated allocation with no overlapping).
  TUOLUMNE_PERF_ALLOC: "--queue=pci --exclusive --time-limit=15m --nodes=1 --begin-time=+5s"
# Project specific variants for tuolumne
  PROJECT_TUOLUMNE_VARIANTS: "~shared +openmp"
# Project specific deps for tuolumne
  PROJECT_TUOLUMNE_DEPS: "^blt@develop "

# Lassen and Butte use a different job scheduler (spectrum lsf) that does not
# allow pre-allocation the same way slurm does.
# Arguments for job level allocation
  LASSEN_JOB_ALLOC: "1 -W 25 -q pci"
# Project specific variants for lassen
  PROJECT_LASSEN_VARIANTS: "~shared +openmp cuda_arch=70"
# Project specific deps for lassen
  PROJECT_LASSEN_DEPS: "^blt@develop "

# Configuration shared by build and test jobs specific to this project.
# Not all configuration can be shared. Here projects can fine tune the
# CI behavior.
# See Umpire for an example (export junit test reports).
.custom_job:
  artifacts:
    reports:
      junit: junit.xml
    name: "${CI_PROJECT_NAME}-${CI_MACHINE}-${CI_JOB_NAME}-${CI_PIPELINE_ID}"
    paths:
      - ./*.cmake

.custom_perf:
  variables:
    CALI_CONFIG: "event-trace,runtime-report,print.metadata"

.reproducer_vars:
  script:
    - |
      echo -e "
      # Required variables \n
      export MODULE_LIST=\"${MODULE_LIST}\" \n
      export SPEC=\"${SPEC//\"/\\\"}\" \n
      # Allow to set job script for debugging (only this differs from CI) \n
      export DEBUG_MODE=true \n
      # Using the CI build cache is optional and requires a token. Set it like so: \n
      # export REGISTRY_TOKEN=\"<your token here>\" \n"
