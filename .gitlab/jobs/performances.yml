clang_14_0_6_openmp_caliper:
  variables:
    SPEC: "~shared +openmp +caliper %clang@=14.0.6"
    PERF_KERNELS: "Basic"
    PERF_VARIANTS: "RAJA_Seq RAJA_OpenMP"
    # Exclude unstable kernels (>~ 2% chance of regression >120% of previous run)
    PERF_EXCLUDE_KERNELS: >
      ARRAY_OF_PTRS
      COPY8
      PI_ATOMIC
      REDUCE3_INT
      REDUCE_STRUCT
    PERF_RUN_OPTS: "--repfact 5.0"
    OMP_NUM_THREADS: "16"
  extends: .perf_on_dane

gcc_10_3_1_openmp_caliper:
  variables:
    SPEC: "~shared +openmp +caliper %gcc@=10.3.1"
    PERF_KERNELS: "Basic"
    PERF_VARIANTS: "RAJA_Seq RAJA_OpenMP"
    # Exclude unstable kernels (>~ 2% chance of regression >120% of previous run)
    PERF_EXCLUDE_KERNELS: >
      ARRAY_OF_PTRS
      DAXPY
      EMPTY
      INIT3
      INIT_VIEW1D
      INIT_VIEW1D_OFFSET
      NESTED_INIT
      PI_ATOMIC
      REDUCE3_INT
      TRAP_INT
    PERF_RUN_OPTS: "--repfact 5.0"
    OMP_NUM_THREADS: "16"
  extends: .perf_on_dane

clang_14_0_6_mpi_caliper:
  variables:
    SPEC: "~shared +mpi +caliper %clang@=14.0.6"
    PERF_KERNELS: "Basic"
    PERF_VARIANTS: "RAJA_Seq"
    PERF_RUN_OPTS: "--repfact 5.0"
    PERF_MPI_EXEC: "srun --overlap -n 112"
  extends: .perf_on_dane

rocmcc_6_4_1_hip_openmp_caliper:
  variables:
    SPEC: "~shared +rocm +openmp +caliper amdgpu_target=gfx942 %rocmcc@=6.4.1 ^hip@6.4.1 ^caliper~shared~libunwind ^adiak~shared~mpi ^papi~shared"
    PERF_KERNELS: "Basic"
    PERF_VARIANTS: "RAJA_HIP"
    PERF_RUN_OPTS: "--sizefact 5.0"
    # Exclude unstable kernels (>~ 2% chance of regression >120% of previous run)
    PERF_EXCLUDE_KERNELS: >
      TRAP_INT
  extends: .perf_on_tuolumne

process_results:
  extends: .caliper_to_gh_benchmark
  dependencies:
    - clang_14_0_6_openmp_caliper
    - gcc_10_3_1_openmp_caliper
    - clang_14_0_6_mpi_caliper
    - rocmcc_6_4_1_hip_openmp_caliper

report_results:
  extends: .report_to_gh_benchmark
  dependencies:
    - process_results
