# Override reproducer section to define project specific variables.
.tuolumne_reproducer_vars:
  script:
    - !reference [.reproducer_vars, script]

########################
# Overridden shared jobs
########################
# We duplicate the shared jobs description and add necessary changes for RAJA.
# We keep ${PROJECT_<MACHINE>_VARIANTS} and ${PROJECT_<MACHINE>_DEPS} So that
# the comparison with the original job is easier.

## cce 21.0.0 job is in the shared RSC set of jobs

## NOTE: rocm 7.2.0 job turned off since it is covered by rocmcc_7_2_0_hip_openmp
##       job below
rocmcc_7_2_0_hip:
  extends: .job_on_tuolumne
  variables:
    ON_TUOLUMNE: "OFF"

############
# Extra jobs
############
# We do not recommend using ${PROJECT_<MACHINE>_VARIANTS} and
# ${PROJECT_<MACHINE>_DEPS} in the extra jobs. There is no reason not to fully
# describe the spec here.

rocmcc_7_2_0_hip_openmp:
  variables:
    SPEC: "~shared +rocm +openmp amdgpu_target=gfx942 %llvm-amdgpu@=7.2.0 ^hip@7.2.0"
    HSA_ENABLE_SDMA: "1"
    HSA_ENABLE_SDMA_COPY_SIZE_OVERRIDE: "0"
    GPU_FORCE_BLIT_COPY_SIZE: "0"
  extends: .job_on_tuolumne

rocmcc_7_2_0_hip_openmp_mpi:
  variables:
    SPEC: "~shared +rocm +openmp +mpi amdgpu_target=gfx942 %llvm-amdgpu@=7.2.0 ^hip@7.2.0 ^cray-mpich%llvm-amdgpu@=7.2.0 ^blt%llvm-amdgpu@=7.2.0"
    HSA_ENABLE_SDMA: "1"
    HSA_ENABLE_SDMA_COPY_SIZE_OVERRIDE: "0"
    GPU_FORCE_BLIT_COPY_SIZE: "0"
  extends: .job_on_tuolumne
