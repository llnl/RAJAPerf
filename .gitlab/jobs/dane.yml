# Override reproducer section to define projet specific variables.
.dane_reproducer_vars:
  script:
    - !reference [.reproducer_vars, script]

########################
# Overridden shared jobs
########################
# We duplicate the shared jobs description and add necessary changes for RAJA.
# We keep ${PROJECT_<MACHINE>_VARIANTS} and ${PROJECT_<MACHINE>_DEPS} So that
# the comparison with the original job is easier.

# custom variant
oneapi_2023_2_1:
  variables:
    SPEC: "${PROJECT_DANE_VARIANTS} +lowopttest cxxflags==-fp-model=precise %oneapi@=2023.2.1 ${PROJECT_DANE_DEPS}"
  extends: .job_on_dane

oneapi_2025_2_0:
  variables:
    SPEC: "${PROJECT_DANE_VARIANTS} +lowopttest cxxflags==-fp-model=precise %oneapi@=2025.2.0 ${PROJECT_DANE_DEPS}"
  extends: .job_on_dane

# omptask variant
clang_14_0_6:
  variables:
    SPEC: "${PROJECT_DANE_VARIANTS} +omptask %clang@=14.0.6 ${PROJECT_DANE_DEPS}"
  extends: .job_on_dane

# omptask variant
gcc_10_3_1:
  variables:
    SPEC: "${PROJECT_DANE_VARIANTS} +omptask %gcc@=10.3.1 ${PROJECT_DANE_DEPS}"
  extends: .job_on_dane

############
# Extra jobs
############
# We do not recommend using ${PROJECT_<MACHINE>_VARIANTS} and
# ${PROJECT_<MACHINE>_DEPS} in the extra jobs. There is no reason not to fully
# describe the spec here.

oneapi_2023_2_1_mpi:
  variables:
    SPEC: "~shared +openmp +mpi +lowopttest cxxflags==-fp-model=precise %oneapi@=2023.2.1 ^mvapich2 ^blt@develop"
  extends: .job_on_dane

oneapi_2025_2_0_mpi:
  variables:
    SPEC: "~shared +openmp +mpi +lowopttest cxxflags==-fp-model=precise %oneapi@=2025.2.0 ^blt@develop"
  extends: .job_on_dane

clang_19_1_3:
  variables:
    SPEC: " ~shared +openmp %llvm@=19.1.3 ^blt@develop"
  extends: .job_on_dane

gcc_13_3_1:
  variables:
    SPEC: " ~shared +openmp %gcc@=13.3.1 ^blt@develop"
  extends: .job_on_dane

